name: Build Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        continue-on-error: true
        run: ./gradlew assembleDebug --stacktrace > build.log 2>&1

      - name: Commit build log
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          cp build.log build-result.log
          git add build-result.log
          git commit -m "ci: build result log [skip ci]" || true
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check build result
        run: grep -q "BUILD SUCCESSFUL" build.log && echo "SUCCESS" || (grep -A5 "FAILURE\|error:" build.log | head -50 && exit 1)

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VibiShaver-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
