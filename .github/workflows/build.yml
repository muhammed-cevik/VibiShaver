name: Build Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        id: build
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log; echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT; exit ${PIPESTATUS[0]}

      - name: Push error log to repo
        if: failure()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          cp build.log build-error.log
          git add build-error.log
          git commit -m "ci: build error log [skip ci]" || true
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VibiShaver-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
